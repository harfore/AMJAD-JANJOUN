<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Redirecting...</title>
    <script>
        const path = window.location.pathname;

        window.location.href = '/?redirect=' + encodeURIComponent(path);
    </script>
</head>
